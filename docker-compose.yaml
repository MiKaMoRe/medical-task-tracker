services:
  migrate:
    build: ./
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    command: ["./cmd", "migration", "up"]
    restart: "no"
    networks:
      - medical-task-tracker
  backend:
    build: ./
    env_file:
      - ./.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    ports:
      - 8000
    networks:
      - medical-task-tracker
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - medical-task-tracker

volumes:
  pgdata:

networks:
  medical-task-tracker:
    driver: bridge
